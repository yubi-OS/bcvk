name: bcvk-ci
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
permissions: {}
env:
  SOURCE_DATE_EPOCH: 0
  BUILDKIT_MULTI_PLATFORM: true
  BUILDKIT_PROGRESS: tty
  BUILDKIT_TTY_LOG_LINES: 25
  BUILDX_GIT_LABELS: full
  BUILDX_METADATA_PROVENANCE: max
  BUILDX_METADATA_WARNINGS: 1
jobs:
  docker-setup:
    runs-on: ubuntu-latest
    container:
      image: docker://dhi.io/debian-base@sha256:9415967aa0ed8adea8b5c048994259d1982026dca143d0303c7bbe0e11ed67d3
      options: --cgroupns=private --disable-content-trust=false
      credentials:
        username: 0mniteck42
        password: ${{secrets.DOCKER}}
    steps:
      - name: Docker buildx setup
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          use: true
          buildkitd-flags: --oci-worker-rootless true
          version: 0.31.0
          endpoint: rootless
          cache-binary: false
          driver-opts: |
            image=moby/buildkit:v0.29.0@sha256:8550ee821375d58adc345db341b1c08df993d8411544b36fd4c6cb2dd2fb12c5,
            default-load=true,
            cgroup-parent=docker.slice
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs:
      - docker-setup
    permissions:
      contents: read
    services:
      dockerd:
        image: docker://docker.io/moby/buildkit:v0.29.0@sha256:8550ee821375d58adc345db341b1c08df993d8411544b36fd4c6cb2dd2fb12c5
        command: /usr/bin/docker buildx create --name test-builder --label 20e033 --network github_network_3c6bc1d6570942209277596721e4a839 --network-alias dockerd --buildkitd-flags \"--oci-worker-rootless=true\" --driver docker-container --driver-opt \"cgroup-parent=docker.slice,default-load=true,image=docker.io/moby/buildkit:v0.29.0@sha256:8550ee821375d58adc345db341b1c08df993d8411544b36fd4c6cb2dd2fb12c5\" --cgroupns private -e GITHUB_ACTIONS=true -e CI=true
        options: --bootstrap --use
        credentials:
          username: 0mniteck42
          password: ${{secrets.DOCKER}}
    concurrency:
      group: ${{github.workflow}}-${{github.ref}}
      cancel-in-progress: true
    container:
      image: docker://dhi.io/debian-base@sha256:9415967aa0ed8adea8b5c048994259d1982026dca143d0303c7bbe0e11ed67d3
      options: --cgroupns=private --disable-content-trust=false
      credentials:
        username: 0mniteck42
        password: ${{secrets.DOCKER}}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run Install
        run: |
          apt-get -qq update && apt-get -qq install --no-install-recommends build-essential curl git openssl
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Run Cargo Tests
        run: |
          cargo test -p bcvk --lib native_to_disk::
          cargo test -p bcvk-qemu --lib usb_passthrough::
          cargo check --workspace
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Cargo Workspace Warnings
        run: cargo clippy --workspace -- -D warnings
      - name: Git Status
        run: git status
